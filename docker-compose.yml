services:
  xray:
    env_file:
      - .env
    build:
      context: build
      dockerfile: xray
      args:
        RELEASE: ${RELEASE:-26.2.6}
    volumes:
      - ./config.json:/xray/config.json
    ports:
      - "443:443"

  dns:
    build:
      context: build
      dockerfile: dns
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf
      - ./adblock/:/etc/dnsmasq.d/
